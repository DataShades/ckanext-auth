auth-js:
  filter: rjsmin
  output: ckanext-auth/%(version)s-auth.js
  contents:
    - js/vendor/QRious.min.js

    - js/auth-login-form.js
    - js/auth-qr-render.js
    - js/auth-passkey-login.js
    - js/auth-passkey-register.js
    - js/auth-passkey-manage.js

  extra:
    preload:
      - base/main

auth-css:
  filter: cssrewrite
  output: ckanext-auth/%(version)s-auth.css
  contents:
    - css/style.css
